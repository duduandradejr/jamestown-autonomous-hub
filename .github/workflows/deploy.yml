name: Deploy Jamestown Hub to Azure

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          
      - name: Install Dependencies
        working-directory: ./sdtcc/app
        run: npm install

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-jamestown-hub
          publish-profile: ${{ secrets.AZURE_CREDENTIALS }}
          package: ./sdtcc/app